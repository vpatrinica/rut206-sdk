config main 'main'
	option enabled '1'

config instance '1'
	option common_address '1'
	option name 'Server 1'
	option enabled '1'
	option spontaneous_enabled '0'
	option cyclic_enabled '0'
	list pins 'din1.high'
	list pins 'din2.high'
	option configure_pins '1'
	option connection_type 'iec104'
	option port '2404'

config instance '2'
	option common_address '1'
	option name 'Server 2'
	option parity 'none'
	option balanced '0'
	option link_layer_address '1'
	option flowcontrol 'none'
	option device '/dev/rs232'
	option connection_type 'iec101'
	option configure_pins '0'
	option stopbits '1'
	option spontaneous_enabled '0'
	option cyclic_enabled '0'
	option baudrate '9600'
	option databits '8'
	option enabled '1'

config instance '3'
	option common_address '1'
	option name 'Server 3'
	option balanced '1'
	option link_layer_address '1'
	option flowcontrol 'none'
	option configure_pins '0'
	option spontaneous_enabled '0'
	option baudrate '9600'
	option parity 'none'
	option device '/dev/rs485'
	option connection_type 'iec101'
	option stopbits '1'
	option cyclic_enabled '0'
	option databits '8'
	option enabled '1'
	option full_duplex_enabled '1'

config tag '4'
	option enabled '1'
	option instance_id '1'
	option tag_name 'Server: uptime, Request: read_uptime'
	option tag_start '0'
	option tag_count '1'
	option tag_type 'uint32'
	option io_type '7'
	option io_address '100'
	option tag_id '1.3'
	option tag_source 'modbus_client'
	option tag_permissions 'r'

config tag '5'
	option enabled '1'
	option instance_id '1'
	option tag_name 'Server: Float, Request: ACL_float'
	option tag_start '0'
	option tag_count '1'
	option tag_type 'float32'
	option io_type '13'
	option io_address '101'
	option tag_id '1.6'
	option tag_source 'modbus_client'
	option tag_permissions 'r'

config tag '6'
	option enabled '1'
	option instance_id '1'
	option tag_name 'Server: uptime, Request: test_bin'
	option tag_start '0'
	option tag_count '1'
	option tag_type 'int32'
	option io_type '1'
	option io_address '120'
	option tag_id '1.8'
	option tag_source 'modbus_client'
	option tag_permissions 'r'

config tag '7'
	option enabled '1'
	option instance_id '1'
	option tag_name 'Server: uptime, Request: test_string'
	option tag_start '0'
